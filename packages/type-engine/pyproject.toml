[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ztap-typeengine"
version = "0.1.0"
description = "Postgres <-> Delta type mapping and conflict resolution for ztap-oss"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
dependencies = []

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
include = ["ztap_typeengine*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
