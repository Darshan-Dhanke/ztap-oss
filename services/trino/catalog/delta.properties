connector.name=delta_lake
# File-based metastore on a persistent volume so table registrations survive
# Trino restarts (no external Hive metastore needed to stay self-contained).
hive.metastore=file
hive.metastore.catalog.dir=file:///var/trino/metastore
# Native S3 filesystem pointed at MinIO.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
# Lets us register Delta tables the sink wrote, by their storage location.
delta.register-table-procedure.enabled=true
